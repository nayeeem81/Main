name: CI/CD Master Release Pipeline

on:
  push:
    branches: [ "master", "main" ] # Triggers when code is pushed or merged to master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to create GitHub Releases
      packages: write   # Required to push Docker images to GHCR

    steps:
      # 1. Fetch code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Extract metadata (Tags, Labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      # 3. Set up Docker Buildx (Enables advanced caching and features)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log in to GitHub's container registry automatically
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Build and Push the Docker image (Notice the fix for your 'bin' folder issue!)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .   # Crucial: Forces Docker to look at your runner workspace
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 6. Generate a New Release Tag automatically using the short SHA
      - name: Create Git Tag
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. Create GitHub Release Package
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          body: |
            Automated production build from master branch merge.
            Docker Image: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
