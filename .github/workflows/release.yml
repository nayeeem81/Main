name: Build and Create Release Package

on:
  push:
    branches:
      - master # Triggers when code is merged/pushed to master

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to create GitHub Releases
      packages: write   # Required to push to GitHub Container Registry

    

    steps:
    # 1. Checkout the source code
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. Setup .NET SDK to run tests before packaging
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 3. Restore and Test code to ensure no bugs are released
    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Solution
      run: dotnet build --no-restore -c Release

    # 4. Set up Docker Buildx (advanced builder engine)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5. Log in to GitHub Container Registry (GHCR)
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # NEW STEP: Convert repository name to lowercase to satisfy Docker requirements
    - name: Downcase Repository Name
      run: |
        echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    # 6. Generate a unique version tag based on build number
    - name: Generate Version Tag
      id: vars
      run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV

    # 7. Build the single container and push it to GHCR (Using the lowercase variable)
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Main.WebAppCore/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ env.REPO_LOWER }}/main-webappcore:latest
          ghcr.io/${{ env.REPO_LOWER }}/main-webappcore:${{ env.VERSION }}

    # 8. Compile a zip package of raw binaries as a fallback release artifact
    - name: Publish Raw Binaries
      run: dotnet publish Main.WebAppCore/Main.WebAppCore.csproj -c Release -o ./publish_output /p:UseAppHost=false

    - name: Zip Release Package
      run: zip -r release-package.zip ./publish_output

   # 9. Automatically create a formalized Release Package on GitHub
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        name: Release ${{ env.VERSION }}
        body: |
          Automated release compiled from merge to master branch.
          
          **Docker Image URI:** `ghcr.io/${{ env.REPO_LOWER }}/main-webappcore:${{ env.VERSION }}`  # <-- Fixed to use REPO_LOWER
        draft: false
        prerelease: false
        files: release-package.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}